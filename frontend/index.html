<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stable Diffusion Studio</title>
  <link rel="icon" type="image/png" href="/assets/app_icon.png">
  <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-tabs">
        <button type="button" class="topbar-tab is-active" data-mode="library">ライブラリ</button>
        <button type="button" class="topbar-tab" data-mode="sequence">シーケンス</button>
        <button type="button" class="topbar-tab" data-mode="snippets">スニペット</button>
      </div>
      <div class="topbar-actions">
        <div id="service-status" class="service-status" title="バックエンドの起動状態（クリックで再確認）"></div>
        <button type="button" id="btn-queue" title="生成キュー" hidden>⏳ キュー</button>
        <button type="button" id="btn-embed" title="ベクトル検索用の embedding を差分更新する（embedding サーバーを起動します）">Embedding 更新</button>
        <button type="button" id="btn-reindex" title="全フォルダを走査してインデックスを作り直す">インデックス再構築</button>
      </div>
    </header>

    <div id="queue-panel" class="queue-panel" hidden>
      <div class="queue-head">
        <span>生成キュー</span>
        <div class="queue-head-actions">
          <button type="button" id="btn-queue-clear" title="完了・エラーを消去">完了を消去</button>
          <button type="button" id="btn-queue-close">✕</button>
        </div>
      </div>
      <div id="queue-list" class="queue-list"></div>
    </div>

    <main class="panes" id="view-library">
      <!-- 左: フォルダツリー -->
      <aside class="pane pane-tree">
        <div class="pane-toolbar">
          <button type="button" id="btn-folder-new" title="選択フォルダ内に新規フォルダ">＋</button>
          <button type="button" id="btn-folder-rename" title="フォルダ名を変更">✎</button>
          <button type="button" id="btn-folder-delete" title="フォルダを削除">🗑</button>
        </div>
        <div id="tree" class="tree"></div>
        <div class="root-bar">
          <span id="root-path"></span>
          <button type="button" id="btn-root" title="ライブラリの保存先フォルダを変更（Shift+クリックで既定の data/library に戻す）">📂</button>
        </div>
      </aside>

      <div class="pane-resizer" data-resize="left" title="ドラッグで幅を調整"></div>

      <!-- 中央: サムネイルグリッド -->
      <section class="pane pane-grid">
        <div class="pane-toolbar">
          <input type="search" id="search" placeholder="検索（選択フォルダ以下）">
          <select id="search-mode" title="検索方式">
            <option value="keyword">キーワード</option>
            <option value="vector">ベクトル</option>
            <option value="hybrid">ハイブリッド</option>
          </select>
          <label class="btn-like" title="画像を取り込み">
            取り込み<input type="file" id="import-files" accept=".png,.jpg,.jpeg,.webp" multiple hidden>
          </label>
        </div>
        <div id="grid" class="grid" tabindex="0">
          <p class="grid-empty">フォルダを選択してください</p>
        </div>
        <div id="video-strip" class="video-strip" hidden>
          <div class="video-strip-head"><span id="video-strip-title"></span></div>
          <div id="video-strip-list" class="video-strip-list"></div>
        </div>
      </section>

      <div class="pane-resizer" data-resize="right" title="ドラッグで幅を調整"></div>

      <!-- 右: コンテキストパネル -->
      <aside class="pane pane-context">
        <div id="context" class="context"></div>
      </aside>
    </main>

    <!-- シーケンスモード -->
    <main class="panes panes-sequence" id="view-sequence" hidden>
      <!-- 左: シーケンス一覧 -->
      <aside class="pane pane-tree">
        <div class="pane-toolbar">
          <button type="button" id="btn-seq-new" title="新しいシーケンス">＋</button>
          <button type="button" id="btn-seq-rename" title="名前を変更">✎</button>
          <button type="button" id="btn-seq-delete" title="シーケンスを削除">🗑</button>
        </div>
        <div id="seq-list" class="tree"></div>
      </aside>

      <!-- 中央: プレビュー + ノードグラフ -->
      <section class="pane pane-seq-editor">
        <div class="pane-toolbar">
          <button type="button" id="btn-seq-play" title="順路を先頭から連続再生">▶ 連続再生</button>
          <button type="button" id="btn-seq-fit" title="全ノードが収まるように表示">⤢ フィット</button>
          <button type="button" id="btn-seq-export" class="primary" title="順路を無劣化連結して書き出し">連結書き出し</button>
          <span id="seq-status" class="gen-status"></span>
        </div>
        <div class="seq-player-wrap">
          <video id="seq-player"></video>
          <!-- プレイヤー枠の内側に置くことで全画面時もシークバーが表示される -->
          <div class="seq-transport">
            <button type="button" id="seq-play-toggle" title="再生 / 一時停止">▶</button>
            <button type="button" id="seq-loop-toggle" title="ループ再生">🔁</button>
            <span id="seq-time-cur" class="seq-time">0:00</span>
            <div id="seq-seek" class="seq-seek"><div id="seq-seek-fill"></div></div>
            <span id="seq-time-total" class="seq-time">0:00</span>
          </div>
        </div>
        <div id="seq-canvas" class="seq-canvas">
          <div id="seq-canvas-inner" class="seq-canvas-inner">
            <svg id="seq-edges" class="seq-edges"></svg>
            <div id="seq-nodes"></div>
          </div>
          <p id="seq-canvas-hint" class="seq-canvas-empty"></p>
        </div>
      </section>

      <!-- 右: BGM + クリップパレット -->
      <aside class="pane pane-context">
        <div id="seq-bgm" class="seq-bgm"></div>
        <div class="pane-toolbar">
          <input type="search" id="seq-palette-search" placeholder="クリップを検索">
        </div>
        <div id="seq-palette" class="seq-palette"></div>
      </aside>
    </main>
    <audio id="seq-bgm-audio" loop></audio>

    <!-- スニペット編集モード -->
    <main class="panes panes-snippets" id="view-snippets" hidden>
      <aside class="pane pane-tree">
        <div class="pane-toolbar">
          <button type="button" id="btn-snip-new" title="新しいスニペットファイル">＋</button>
          <button type="button" id="btn-snip-delete" title="ファイルを削除">🗑</button>
          <button type="button" id="btn-snip-reveal" title="スニペットフォルダを開く">📂</button>
        </div>
        <div id="snip-files" class="tree"></div>
        <div class="root-bar">
          <span id="snip-root"></span>
          <button type="button" id="btn-snip-root" title="スニペットフォルダを変更">📁</button>
        </div>
      </aside>

      <section class="pane pane-snip-editor">
        <div class="pane-toolbar">
          <span id="snip-editing" class="snip-editing"></span>
          <button type="button" id="btn-snip-save" class="primary" disabled>💾 保存</button>
        </div>
        <textarea id="snip-editor" class="snip-editor" spellcheck="false" placeholder="左のファイルを選択してください（VSCode .code-snippets 形式の JSON）"></textarea>
      </section>
    </main>

    <footer class="statusbar">
      <span id="status"></span>
      <span id="sysstats" class="sysstats"></span>
    </footer>
  </div>
  <script type="module" src="/frontend/app.js"></script>
</body>
</html>
