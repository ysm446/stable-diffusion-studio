<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stable Diffusion Studio</title>
  <link rel="icon" type="image/png" href="/assets/app_icon.png">
  <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-tabs">
        <button type="button" class="topbar-tab is-active" data-mode="library">ライブラリ</button>
        <button type="button" class="topbar-tab" data-mode="sequence">シーケンス</button>
        <button type="button" class="topbar-tab" data-mode="snippets">スニペット</button>
      </div>
      <div class="topbar-actions">
        <div id="service-status" class="service-status" title="バックエンドの起動状態（クリックで再確認）"></div>
        <button type="button" id="btn-queue" title="生成キュー" hidden data-icon="clock"> キュー</button>
        <button type="button" id="btn-settings" title="設定" data-icon="settings"></button>
      </div>
    </header>

    <div id="queue-panel" class="queue-panel" hidden>
      <div class="queue-head">
        <span>生成キュー</span>
        <div class="queue-head-actions">
          <button type="button" id="btn-queue-clear" title="完了・エラーを消去">完了を消去</button>
          <button type="button" id="btn-queue-close" data-icon="x"></button>
        </div>
      </div>
      <div id="queue-list" class="queue-list"></div>
    </div>

    <div id="settings-panel" class="settings-panel" hidden>
      <div class="settings-head">
        <span>設定</span>
        <button type="button" id="btn-settings-close" data-icon="x"></button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-section-title">ライブラリ</div>
          <div class="settings-row">
            <div class="settings-row-main">
              <span class="settings-label">保存先フォルダ</span>
              <span id="settings-root-path" class="settings-value"></span>
            </div>
            <div class="settings-row-actions">
              <button type="button" id="btn-root-change" data-icon="folder-open"> 変更</button>
              <button type="button" id="btn-root-reset" title="既定の data/library に戻す">既定に戻す</button>
            </div>
          </div>
          <div class="settings-row">
            <div class="settings-row-main">
              <span class="settings-label">表示順</span>
              <span class="settings-desc">グリッドの並び順を切り替えます（検索結果は関連度順のまま）</span>
            </div>
            <div class="settings-row-actions">
              <button type="button" id="btn-sort-order"></button>
            </div>
          </div>
          <div class="settings-row">
            <div class="settings-row-main">
              <span class="settings-label">インデックス再構築</span>
              <span class="settings-desc">全フォルダを走査してインデックスを作り直します</span>
            </div>
            <div class="settings-row-actions">
              <button type="button" id="btn-reindex" data-icon="restore"> 実行</button>
            </div>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">検索</div>
          <div class="settings-row">
            <div class="settings-row-main">
              <span class="settings-label">Embedding 更新</span>
              <span class="settings-desc">ベクトル検索用の embedding を差分更新します（embedding サーバーを起動）</span>
            </div>
            <div class="settings-row-actions">
              <button type="button" id="btn-embed" data-icon="sparkles"> 実行</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <main class="panes" id="view-library">
      <!-- 左: フォルダツリー -->
      <aside class="pane pane-tree">
        <div class="pane-toolbar">
          <button type="button" id="btn-folder-new" title="選択フォルダ内に新規フォルダ">＋</button>
          <button type="button" id="btn-folder-open" title="選択中のフォルダをエクスプローラーで開く" data-icon="folder-open"></button>
        </div>
        <div id="tree" class="tree"></div>
        <div class="root-bar">
          <span id="root-path"></span>
          <button type="button" id="btn-root" title="ライブラリの保存先フォルダを変更（Shift+クリックで既定の data/library に戻す）" data-icon="folder-open"></button>
        </div>
      </aside>

      <div class="pane-resizer" data-resize="left" title="ドラッグで幅を調整"></div>

      <!-- 中央: サムネイルグリッド -->
      <section class="pane pane-grid">
        <div class="pane-toolbar">
          <input type="search" id="search" placeholder="検索（選択フォルダ以下）">
          <select id="search-mode" title="検索方式">
            <option value="keyword">キーワード</option>
            <option value="vector">ベクトル</option>
            <option value="hybrid">ハイブリッド</option>
          </select>
          <label class="btn-like" title="画像を取り込み">
            取り込み<input type="file" id="import-files" accept=".png,.jpg,.jpeg,.webp" multiple hidden>
          </label>
        </div>
        <div id="grid" class="grid" tabindex="0">
          <p class="grid-empty">フォルダを選択してください</p>
        </div>
        <div id="video-strip" class="video-strip" hidden>
          <div class="video-strip-head"><span id="video-strip-title"></span></div>
          <div id="video-strip-list" class="video-strip-list"></div>
        </div>
      </section>

      <div class="pane-resizer" data-resize="right" title="ドラッグで幅を調整"></div>

      <!-- 右: コンテキストパネル -->
      <aside class="pane pane-context">
        <div id="context" class="context"></div>
      </aside>
    </main>

    <!-- シーケンスモード -->
    <main class="panes panes-sequence" id="view-sequence" hidden>
      <!-- 左: シーケンス一覧 -->
      <aside class="pane pane-tree">
        <div class="pane-toolbar">
          <button type="button" id="btn-seq-new" title="新しいシーケンス">＋</button>
          <button type="button" id="btn-seq-folder-new" title="新規フォルダ" data-icon="folder"></button>
        </div>
        <div id="seq-list" class="tree"></div>
      </aside>

      <!-- 中央: プレビュー + ノードグラフ -->
      <section class="pane pane-seq-editor">
        <div class="pane-toolbar">
          <button type="button" id="btn-seq-play" title="順路を先頭から連続再生" data-icon="play"> 連続再生</button>
          <button type="button" id="btn-seq-fit" title="全ノードが収まるように表示" data-icon="fit"> フィット</button>
          <button type="button" id="btn-seq-export" class="primary" title="順路を無劣化連結して書き出し">連結書き出し</button>
          <span id="seq-status" class="gen-status"></span>
        </div>
        <div class="seq-player-wrap">
          <video id="seq-player"></video>
          <!-- プレイヤー枠の内側に置くことで全画面時もシークバーが表示される -->
          <div class="seq-transport">
            <button type="button" id="seq-play-toggle" title="再生 / 一時停止" data-icon="play"></button>
            <button type="button" id="seq-loop-toggle" title="ループ再生" data-icon="repeat"></button>
            <span id="seq-time-cur" class="seq-time">0:00</span>
            <div id="seq-seek" class="seq-seek"><div id="seq-seek-fill"></div></div>
            <span id="seq-time-total" class="seq-time">0:00</span>
          </div>
        </div>
        <div id="seq-canvas" class="seq-canvas">
          <div id="seq-canvas-inner" class="seq-canvas-inner">
            <svg id="seq-edges" class="seq-edges"></svg>
            <div id="seq-nodes"></div>
          </div>
          <p id="seq-canvas-hint" class="seq-canvas-empty"></p>
        </div>
      </section>

      <!-- 右: BGM + クリップパレット -->
      <aside class="pane pane-context">
        <div id="seq-bgm" class="seq-bgm"></div>
        <div class="pane-toolbar">
          <input type="search" id="seq-palette-search" placeholder="クリップを検索">
        </div>
        <div id="seq-palette" class="seq-palette"></div>
      </aside>
    </main>
    <audio id="seq-bgm-audio" loop></audio>

    <!-- スニペット編集モード -->
    <main class="panes panes-snippets" id="view-snippets" hidden>
      <aside class="pane pane-tree">
        <div class="pane-toolbar">
          <button type="button" id="btn-snip-new" title="新しいスニペットファイル">＋</button>
          <button type="button" id="btn-snip-delete" title="ファイルを削除" data-icon="trash"></button>
          <button type="button" id="btn-snip-reveal" title="スニペットフォルダを開く" data-icon="folder-open"></button>
        </div>
        <div id="snip-files" class="tree"></div>
        <div class="root-bar">
          <span id="snip-root"></span>
          <button type="button" id="btn-snip-root" title="スニペットフォルダを変更" data-icon="folder"></button>
        </div>
      </aside>

      <aside class="pane pane-snip-entries">
        <div class="pane-toolbar">
          <input type="search" id="snip-search" placeholder="全ファイルから項目を検索">
          <button type="button" id="btn-snip-add-entry" title="項目を追加">＋</button>
        </div>
        <div id="snip-entries" class="tree"></div>
      </aside>

      <section class="pane pane-snip-editor">
        <div class="pane-toolbar">
          <span id="snip-editing" class="snip-editing"></span>
          <button type="button" id="btn-snip-json" hidden>{&nbsp;} JSON 編集</button>
          <button type="button" id="btn-snip-save" class="primary" disabled data-icon="save"> 保存</button>
        </div>
        <div id="snip-form" class="snip-form" hidden>
          <div class="snip-form-help">
            <strong>prefix</strong>: 補完・挿入時の検索キー ／
            <strong>body</strong>: 実際に挿入される文字列 ／
            <strong>description</strong>: 候補一覧に出る説明
          </div>
          <label class="snip-form-field">Name（管理用の名前）
            <input type="text" id="snip-f-name" placeholder="arms spread">
          </label>
          <label class="snip-form-field">Prefix
            <input type="text" id="snip-f-prefix" placeholder="arms spread">
          </label>
          <label class="snip-form-field">Description
            <input type="text" id="snip-f-desc" placeholder="腕を横に伸ばす">
          </label>
          <label class="snip-form-field snip-form-body">Body
            <textarea id="snip-f-body" spellcheck="false" placeholder="arms spread"></textarea>
          </label>
          <div class="snip-form-footer">
            <button type="button" id="btn-snip-del-entry" data-icon="trash"> この項目を削除</button>
          </div>
        </div>
        <textarea id="snip-editor" class="snip-editor" spellcheck="false" placeholder="左のファイルを選択してください（VSCode .code-snippets 形式の JSON）"></textarea>
      </section>
    </main>

    <footer class="statusbar">
      <span id="status"></span>
      <span id="sysstats" class="sysstats"></span>
    </footer>
  </div>
  <script type="module" src="/frontend/app.js"></script>
</body>
</html>
