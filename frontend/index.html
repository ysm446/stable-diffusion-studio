<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stable Diffusion Studio</title>
  <link rel="icon" type="image/png" href="/assets/app_icon.png">
  <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-tabs">
        <button type="button" class="topbar-tab is-active" data-mode="library">ライブラリ</button>
        <button type="button" class="topbar-tab" data-mode="sequence">シーケンス</button>
      </div>
      <div class="topbar-actions">
        <button type="button" id="btn-reindex" title="全フォルダを走査してインデックスを作り直す">インデックス再構築</button>
      </div>
    </header>

    <main class="panes" id="view-library">
      <!-- 左: フォルダツリー -->
      <aside class="pane pane-tree">
        <div class="pane-toolbar">
          <button type="button" id="btn-folder-new" title="選択フォルダ内に新規フォルダ">＋</button>
          <button type="button" id="btn-folder-rename" title="フォルダ名を変更">✎</button>
          <button type="button" id="btn-folder-delete" title="フォルダを削除">🗑</button>
        </div>
        <div id="tree" class="tree"></div>
      </aside>

      <!-- 中央: サムネイルグリッド -->
      <section class="pane pane-grid">
        <div class="pane-toolbar">
          <input type="search" id="search" placeholder="検索（選択フォルダ以下）">
          <label class="btn-like" title="画像を取り込み">
            取り込み<input type="file" id="import-files" accept=".png,.jpg,.jpeg,.webp" multiple hidden>
          </label>
        </div>
        <div id="grid" class="grid" tabindex="0">
          <p class="grid-empty">フォルダを選択してください</p>
        </div>
      </section>

      <!-- 右: コンテキストパネル -->
      <aside class="pane pane-context">
        <div id="context" class="context"></div>
      </aside>
    </main>

    <!-- シーケンスモード -->
    <main class="panes panes-sequence" id="view-sequence" hidden>
      <!-- 左: シーケンス一覧 -->
      <aside class="pane pane-tree">
        <div class="pane-toolbar">
          <button type="button" id="btn-seq-new" title="新しいシーケンス">＋</button>
          <button type="button" id="btn-seq-rename" title="名前を変更">✎</button>
          <button type="button" id="btn-seq-delete" title="シーケンスを削除">🗑</button>
        </div>
        <div id="seq-list" class="tree"></div>
      </aside>

      <!-- 中央: プレビュー + クリップ並び -->
      <section class="pane pane-seq-editor">
        <div class="pane-toolbar">
          <button type="button" id="btn-seq-play">▶ 連続再生</button>
          <button type="button" id="btn-seq-export" class="primary">連結書き出し</button>
          <span id="seq-status" class="gen-status"></span>
        </div>
        <div class="seq-player-wrap">
          <video id="seq-player" controls></video>
        </div>
        <div id="seq-clips" class="seq-clips"></div>
      </section>

      <!-- 右: クリップパレット -->
      <aside class="pane pane-context">
        <div class="pane-toolbar">
          <input type="search" id="seq-palette-search" placeholder="クリップを検索">
        </div>
        <div id="seq-palette" class="seq-palette"></div>
      </aside>
    </main>

    <footer class="statusbar"><span id="status"></span></footer>
  </div>
  <script type="module" src="/frontend/app.js"></script>
</body>
</html>
